<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · REDCUT</title><link rel="stylesheet" href="assets/app.css">
<style>
  .shell{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 60px)}
  @media(max-width:820px){.shell{grid-template-columns:1fr}.side{display:none}}
  .side{border-right:1px solid var(--line);padding:22px 16px;background:var(--bg2)}
  .side h4{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin:20px 0 8px}
  .side a{display:flex;justify-content:space-between;gap:8px;padding:7px 10px;border-radius:var(--r);color:var(--mut);font-size:13px;cursor:pointer}
  .side a:hover{background:var(--panel2);color:var(--txt)}
  .side a.on{background:var(--panel2);color:var(--txt);box-shadow:inset 2px 0 0 var(--red)}
  .side a b{font-size:11px;color:var(--mut)}
  .main{padding:26px 30px}
  .head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:22px}
  .head h2{font-size:24px}
  .meter{height:5px;background:#1c1c22;border-radius:6px;overflow:hidden;margin:8px 0 4px}
  .meter i{display:block;height:100%;background:var(--red)}
  .projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:16px}
  .p{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel);cursor:pointer;transition:.15s;position:relative}
  .p:hover{border-color:var(--red-dim);transform:translateY(-2px)}
  .p .th{aspect-ratio:16/9;background:#000 center/cover;display:grid;place-items:center;color:#2f2f39;font-size:26px;border-bottom:1px solid var(--line)}
  .p .meta{padding:11px 12px}
  .p .nm{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .p .sub{font-size:11.5px;color:var(--mut);margin-top:3px;display:flex;gap:8px}
  .p .more{position:absolute;top:8px;right:8px;background:rgba(10,10,12,.82);border:1px solid var(--line);border-radius:var(--r);width:26px;height:24px;display:grid;place-items:center;font-size:14px;opacity:0;transition:.15s}
  .p:hover .more{opacity:1}
  .p .pin{position:absolute;top:8px;left:8px;color:var(--red);font-size:13px}
  .newp{border:1px dashed #2e2e37;border-radius:10px;display:grid;place-items:center;min-height:170px;cursor:pointer;color:var(--mut);text-align:center;padding:16px}
  .newp:hover{border-color:var(--red);color:var(--txt);background:#120f13}
  .menu{position:fixed;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:5px;z-index:70;min-width:170px;box-shadow:0 18px 40px rgba(0,0,0,.6)}
  .menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--txt);padding:7px 10px;border-radius:4px;font:inherit;font-size:13px;cursor:pointer}
  .menu button:hover{background:var(--panel2)}
  .menu button.dang{color:var(--red)}
  .tpl{display:flex;gap:12px;overflow:auto;padding-bottom:6px}
  .tpl div{flex:none;width:150px;border:1px solid var(--line);border-radius:8px;padding:12px;cursor:pointer;background:var(--panel)}
  .tpl div:hover{border-color:var(--red-dim)}
  .tpl .ar{border-radius:4px;background:linear-gradient(140deg,#2a1218,#101015);margin-bottom:9px;border:1px solid var(--line)}
  .ex{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .empty{border:1px dashed var(--line);border-radius:10px;padding:48px 20px;text-align:center;color:var(--mut)}
</style></head><body>

<div class="shell">
  <aside class="side">
    <h4>Library</h4>
    <a data-view="all" class="on">All projects <b id="cAll">0</b></a>
    <a data-view="recent">Recent</a>
    <a data-view="pinned">Pinned <b id="cPin">0</b></a>
    <a data-view="trash">Trash <b id="cTrash">0</b></a>
    <h4>Folders</h4>
    <div id="folders"></div>
    <a id="newFolder" style="color:var(--red)">+ New folder</a>
    <h4>Storage</h4>
    <div style="padding:0 10px">
      <div class="meter"><i id="mBar" style="width:0"></i></div>
      <div class="hint mono" id="mTxt">0 B</div>
    </div>
    <h4>Account</h4>
    <a href="settings.html">Settings</a>
    <a href="pricing.html">Plan <b id="plan">free</b></a>
    <a id="logout">Log out</a>
  </aside>

  <main class="main">
    <div class="head">
      <h2 id="hello">Welcome back</h2>
      <div class="grow" style="flex:1"></div>
      <input type="search" id="q" placeholder="Search projects" style="width:220px">
      <select id="sort" style="width:auto"><option value="updated">Last edited</option><option value="created">Date created</option><option value="name">Name</option><option value="duration">Duration</option></select>
      <a class="btn primary" id="new">New project</a>
    </div>

    <div id="grid" class="projects"></div>

    <h3 style="margin:34px 0 12px">Start from a template</h3>
    <div class="tpl" id="tpls"></div>

    <h3 style="margin:34px 0 12px">Recent exports</h3>
    <div id="exports"></div>
  </main>
</div>

<script src="assets/store.js"></script>
<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const user = RC.Auth.require();
let view="all", folder="", projects=[], q="", sortBy="updated";

$("#hello").textContent = "Welcome back, "+user.name.split(" ")[0];
$("#plan").textContent = user.plan;
$("#logout").onclick=()=>{ RC.Auth.logout(); location.href="index.html"; };
$("#new").onclick=async()=>{ const p=await RC.Projects.create(user); location.href="editor.html?p="+p.id; };
$("#q").oninput=e=>{q=e.target.value.toLowerCase();paint()};
$("#sort").onchange=e=>{sortBy=e.target.value;paint()};
$$(".side a[data-view]").forEach(a=>a.onclick=()=>{ view=a.dataset.view; folder=""; $$(".side a").forEach(x=>x.classList.remove("on")); a.classList.add("on"); paint(); });
$("#newFolder").onclick=()=>{
  const name=prompt("Folder name"); if(!name)return;
  const f=RC.LS.get("redcut:folders:"+user.id,[]); if(!f.includes(name)) f.push(name);
  RC.LS.set("redcut:folders:"+user.id,f); paintFolders(); };

const TEMPLATES=[
  ["Instagram reel","1080×1920","9/16"],["YouTube short","1080×1920","9/16"],["YouTube video","1920×1080","16/9"],
  ["Podcast clip","1080×1080","1/1"],["Product promo","1920×1080","16/9"],["Real estate tour","1920×1080","16/9"],
  ["Wedding highlight","1920×1080","16/9"],["Travel montage","1920×1080","16/9"]
];
$("#tpls").innerHTML = TEMPLATES.map((t,i)=>`<div data-t="${i}">
  <div class="ar" style="aspect-ratio:${t[2]};${t[2]==="9/16"?"height:96px":""}"></div>
  <div style="font-size:12.5px;font-weight:600">${t[0]}</div><div class="hint mono">${t[1]}</div></div>`).join("");
$("#tpls").onclick=async e=>{
  const d=e.target.closest("[data-t]"); if(!d)return;
  const t=TEMPLATES[+d.dataset.t];
  const p=await RC.Projects.create(user,{name:t[0],doc:{fps:30,zoom:60,playhead:0,markers:[],media:[],clips:[],res:t[1].replace("×","x")}});
  location.href="editor.html?p="+p.id;
};

function paintFolders(){
  const f=RC.LS.get("redcut:folders:"+user.id,[]);
  $("#folders").innerHTML = f.length ? f.map(n=>`<a data-folder="${n}">${n} <b>${projects.filter(p=>p.folder===n&&!p.trashed).length}</b></a>`).join("")
    : `<p class="hint" style="padding:0 10px">No folders yet</p>`;
  $$("#folders a").forEach(a=>a.onclick=()=>{ view="folder"; folder=a.dataset.folder;
    $$(".side a").forEach(x=>x.classList.remove("on")); a.classList.add("on"); paint(); });
}

async function load(){
  projects = await RC.Projects.list(user.id);
  const used = await RC.Projects.usage(user.id);
  $("#mBar").style.width = Math.min(100, used/user.quotaBytes*100)+"%";
  $("#mTxt").textContent = RC.fmtBytes(used)+" of "+RC.fmtBytes(user.quotaBytes);
  $("#cAll").textContent = projects.filter(p=>!p.trashed).length;
  $("#cPin").textContent = projects.filter(p=>p.pinned&&!p.trashed).length;
  $("#cTrash").textContent = projects.filter(p=>p.trashed).length;
  paintFolders(); paint(); paintExports();
}
function paint(){
  let list = projects.filter(p=>{
    if(view==="trash") return p.trashed;
    if(p.trashed) return false;
    if(view==="pinned") return p.pinned;
    if(view==="folder") return p.folder===folder;
    if(view==="recent") return Date.now()-p.updated < 7*864e5;
    return true;
  });
  if(q) list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.tags||[]).join(" ").toLowerCase().includes(q));
  list.sort((a,b)=> sortBy==="name" ? a.name.localeCompare(b.name)
    : sortBy==="created" ? b.created-a.created
    : sortBy==="duration" ? (b.duration||0)-(a.duration||0) : b.updated-a.updated);
  list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));

  const g=$("#grid");
  const cards = list.map(p=>`<article class="p" data-id="${p.id}">
    ${p.pinned?'<span class="pin">●</span>':''}
    <button class="more" data-more="${p.id}">⋯</button>
    <div class="th" style="${p.thumb?`background-image:url(${p.thumb})`:""}">${p.thumb?"":"▦"}</div>
    <div class="meta"><div class="nm">${esc(p.name)}</div>
      <div class="sub mono"><span>${RC.fmtClock(p.duration)}</span><span>·</span><span>${RC.fmtDate(p.updated)}</span></div>
    </div></article>`).join("");
  g.innerHTML = (view==="trash" ? "" : `<div class="newp" id="np"><div><div style="font-size:24px;color:var(--red)">+</div>New project<div class="hint">Blank 1920×1080 timeline</div></div></div>`) + cards;
  if(!list.length && view==="trash") g.innerHTML = `<div class="empty" style="grid-column:1/-1">Trash is empty. Deleted projects rest here until you remove them for good.</div>`;
  const np=$("#np"); if(np) np.onclick=$("#new").onclick;
  $$(".p").forEach(c=>c.onclick=e=>{
    if(e.target.dataset.more!==undefined) return menu(e, c.dataset.id);
    location.href="editor.html?p="+c.dataset.id;
  });
}
function esc(s){ return (s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }

function menu(e,id){
  e.stopPropagation();
  document.querySelector(".menu")?.remove();
  const p = projects.find(x=>x.id===id);
  const m=document.createElement("div"); m.className="menu";
  m.style.left=Math.min(e.clientX,innerWidth-190)+"px"; m.style.top=e.clientY+"px";
  m.innerHTML = p.trashed
    ? `<button data-a="restore">Restore</button><button data-a="purge" class="dang">Delete for good</button>`
    : `<button data-a="open">Open</button><button data-a="rename">Rename</button>
       <button data-a="pin">${p.pinned?"Unpin":"Pin to top"}</button>
       <button data-a="dup">Duplicate</button><button data-a="folder">Move to folder</button>
       <button data-a="tags">Edit tags</button><button data-a="versions">Version history</button>
       <button data-a="export">Download .redcut</button><button data-a="trash" class="dang">Move to trash</button>`;
  document.body.appendChild(m);
  setTimeout(()=>addEventListener("click",()=>m.remove(),{once:true}));
  m.onclick=async ev=>{
    const a=ev.target.dataset.a; if(!a)return; m.remove();
    if(a==="open") location.href="editor.html?p="+id;
    if(a==="rename"){ const n=prompt("Project name",p.name); if(n){p.name=n; await RC.Projects.save(p);} }
    if(a==="pin"){ p.pinned=!p.pinned; await RC.Projects.save(p); }
    if(a==="dup"){ await RC.Projects.duplicate(p); RC.toast("Duplicated"); }
    if(a==="folder"){ const f=RC.LS.get("redcut:folders:"+user.id,[]);
      const n=prompt("Move to folder ("+(f.join(", ")||"none yet")+"), blank to remove", p.folder||"");
      if(n!==null){ p.folder=n.trim(); if(n.trim()&&!f.includes(n.trim())){f.push(n.trim());RC.LS.set("redcut:folders:"+user.id,f);} await RC.Projects.save(p); } }
    if(a==="tags"){ const t=prompt("Tags, comma separated",(p.tags||[]).join(", "));
      if(t!==null){ p.tags=t.split(",").map(s=>s.trim()).filter(Boolean); await RC.Projects.save(p); } }
    if(a==="versions") versions(p);
    if(a==="export"){ const b=new Blob([JSON.stringify(p,(k,v)=>k==="blob"?undefined:v,1)],{type:"application/json"});
      const a2=document.createElement("a"); a2.href=URL.createObjectURL(b); a2.download=p.name+".redcut"; a2.click(); }
    if(a==="trash"){ await RC.Projects.trash(p,true); RC.toast("Moved to trash"); }
    if(a==="restore"){ await RC.Projects.trash(p,false); }
    if(a==="purge"){ if(confirm("Delete "+p.name+" permanently? This cannot be undone.")) await RC.Projects.remove(id); }
    load();
  };
}
function versions(p){
  const v=(p.versions||[]).slice().reverse();
  RC.modal(`<div class="mh"><b class="ttl">Version history · ${esc(p.name)}</b><button class="btn sm ghost" data-x>Close</button></div>
  <div class="mb">${v.length? v.map((x,i)=>`<div class="ex"><div><b>${x.label||"Autosave"}</b><div class="hint">${RC.fmtDate(x.at)} · ${x.doc.clips.length} clips</div></div>
     <button class="btn sm" data-v="${v.length-1-i}">Restore</button></div>`).join("")
    : `<p class="mut">No saved versions yet. The editor keeps a version each time you export or save manually.</p>`}</div>`);
  document.querySelector(".modal").onclick=async e=>{
    const i=e.target.dataset.v; if(i===undefined)return;
    p.doc=JSON.parse(JSON.stringify(p.versions[+i].doc)); await RC.Projects.save(p);
    RC.closeModal(); RC.toast("Version restored"); load();
  };
}
async function paintExports(){
  const list=await RC.Exports.list(user.id);
  $("#exports").innerHTML = list.length ? list.slice(0,8).map(e=>`<div class="ex">
      <div><b>${esc(e.name)}</b><div class="hint mono">${e.res} · ${e.fps} fps · ${RC.fmtBytes(e.size)} · ${RC.fmtDate(e.at)}</div></div>
      <span class="tag red">done</span></div>`).join("")
    : `<div class="empty">Nothing exported yet. Finish a cut and your renders get logged here.</div>`;
}
load();
</script></body></html>
